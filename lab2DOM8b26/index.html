<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Galería Dinámica</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="top">
    <h1>Galería Dinámica</h1>
    <p class="muted">DOM + Eventos + Transiciones</p>
  </header>

  <main class="layout">

    <!-- VISOR PRINCIPAL -->
    <section class="viewer" aria-label="Visor principal">

      <div class="frame">
        <img id="heroImg" alt="Imagen principal" />

        <button id="likeBtn" class="like" type="button" aria-pressed="false">♡</button>

        <div class="controls">
          <button id="prevBtn" type="button">←</button>
          <button id="nextBtn" type="button">→</button>
          <button id="playBtn" type="button">▶</button>
        </div>
      </div>

      <div class="meta">
        <div>
          <h2 id="heroTitle">—</h2>
          <p id="heroDesc" class="muted">—</p>
        </div>

        <div class="pill">
          <span id="counter">0 / 0</span>
        </div>
      </div>

      <!-- 🔥 MINIATURAS DEBAJO -->
      <div class="strip">
        <div id="thumbs" class="thumbs"></div>
      </div>

    </section>

  </main>

  <footer class="bottom muted">
    Teclas: ← → para navegar
  </footer>

  <script src="app.js"></script>
</body>
</html>
